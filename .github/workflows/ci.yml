name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: crates/locr-core/assets
          key: locr-ocrs-models-${{ runner.os }}-${{ hashFiles('crates/locr-core/build.rs') }}
          restore-keys: |
            locr-ocrs-models-${{ runner.os }}-
      - run: cargo check --workspace
      - run: cargo test --workspace

  ffi:
    name: C ABI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: crates/locr-core/assets
          key: locr-ocrs-models-${{ runner.os }}-${{ hashFiles('crates/locr-core/build.rs') }}
          restore-keys: |
            locr-ocrs-models-${{ runner.os }}-
      - run: cargo build -p locr-ffi --release
      - uses: actions/upload-artifact@v4
        with:
          name: locr-ffi-${{ matrix.os }}
          path: |
            target/release/*locr*.dll
            target/release/*locr*.so
            target/release/*locr*.dylib
            target/release/*locr*.a
            target/release/*locr*.lib
            crates/locr-ffi/include/locr.h

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: crates/locr-core/assets
          key: locr-ocrs-models-${{ runner.os }}-${{ hashFiles('crates/locr-core/build.rs') }}
          restore-keys: |
            locr-ocrs-models-${{ runner.os }}-
      - run: cargo build -p locr-wasm --target wasm32-unknown-unknown

  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: crates/locr-core/assets
          key: locr-ocrs-models-${{ runner.os }}-${{ hashFiles('crates/locr-core/build.rs') }}
          restore-keys: |
            locr-ocrs-models-${{ runner.os }}-
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          working-directory: packages/locr-py

  node:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - working-directory: packages/locr-js
        run: npm install && npm run build
